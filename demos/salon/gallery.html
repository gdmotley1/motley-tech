  <!-- scroll-reveal: fade sections + grid children into view as they scroll in -->
  <script>
    (() => {
      if (!('IntersectionObserver' in window)) return;
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
      // Auto-tag every <section> and select .auto-reveal blocks
      const sections = document.querySelectorAll('section, .auto-reveal');
      sections.forEach(el => { if (!el.classList.contains('no-reveal')) el.classList.add('reveal'); });
      // Stagger: apply reveal to direct children of every grid inside a section (at most 8 staggered)
      document.querySelectorAll('section [class*="grid-cols"], section .grid').forEach(grid => {
        [...grid.children].forEach((child, i) => {
          if (!child.classList.contains('no-reveal') && !child.classList.contains('reveal')) {
            child.classList.add('reveal');
            child.style.transitionDelay = Math.min(i * 40, 200) + 'ms';
          }
        });
      });
      if (reduced) {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-in'));
        return;
      }
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-in');
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -6% 0px' });
      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    })();
  </script>
